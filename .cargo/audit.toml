# RustSec (cargo-audit) configuration. Mirrors deny.toml's [advisories].ignore so the
# `cargo audit` and `cargo deny` gates agree. These are *unmaintained* (not vulnerable)
# transitive crates pulled only by nickel-lang-core's REPL/markdown stack; reviewed
# 2026-06-17, no safe upgrade available.
[advisories]
ignore = [
    "RUSTSEC-2024-0320", # yaml-rust unmaintained (syntect <- comrak <- nickel-lang-core)
    "RUSTSEC-2024-0436", # paste unmaintained (nickel-lang-core)
    "RUSTSEC-2025-0141", # bincode 1.x unmaintained (syntect <- comrak <- nickel-lang-core)
]
