# cargo-deny policy (Standard §3.3, §4.2). CI-blocking once dependencies are added.
# The scaffold is dependency-free; this encodes the license/advisory policy up front.

[advisories]
version = 2
yanked = "deny"
# `cargo audit` (RustSec) is the primary advisory gate; cargo-deny double-checks.

[licenses]
version = 2
# GPL-compatible licenses only (Standard §4.2). The project itself is GPL-3.0-or-later;
# permissive upstreams are allowed and their texts shipped verbatim in LICENSES/.
allow = [
    "GPL-3.0-or-later",
    "CC-BY-SA-4.0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
