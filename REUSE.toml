# SPDX-License-Identifier: CC-BY-SA-4.0

version = 1
SPDX-PackageName = "majestic"
SPDX-PackageSupplier = "Mohamed Hammad <Mohamed.Hammad@SpacecraftSoftware.org>"
SPDX-PackageDownloadLocation = "https://Majestic.SpacecraftSoftware.org/"

# Almost every file carries an inline two-tag SPDX header. This annotation covers the
# generated Cargo.lock, which cargo rewrites and therefore can't hold a stable header.
[[annotations]]
path = "Cargo.lock"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Mohamed Hammad <Mohamed.Hammad@SpacecraftSoftware.org>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# The hand-authored Texinfo syntax carries an inline SPDX header, but REUSE may not recognize the
# `.sublime-syntax` comment style — declare it here too so the lint gate is unambiguous.
[[annotations]]
path = "crates/majestic-core/assets/syntaxes/texinfo.sublime-syntax"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Mohamed Hammad <Mohamed.Hammad@SpacecraftSoftware.org>"
SPDX-License-Identifier = "GPL-3.0-or-later"
